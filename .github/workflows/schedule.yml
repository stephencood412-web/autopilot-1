name: Scheduled Promotion Runner

on:
  schedule:
    - cron: '0 09 * * *' # daily at 09:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "Note: optional dependencies may be unavailable"
      - name: Verify automation is active
        run: |
          echo "✓ Autopilot promotion engine active"
          echo "✓ Workflow triggered at $(date)"
          echo "✓ Content file:"
          cat content/scheduled/post1.md || echo "No content found"
      - name: Run Mastodon post
        if: secrets.MASTODON_TOKEN != ''
        continue-on-error: true
        env:
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          MESSAGE_FILE: content/scheduled/post1.md
        run: python scripts/post_mastodon.py || echo "Mastodon post skipped (no secret or error)"
      - name: Report status
        run: echo "✓ Autopilot workflow completed"
